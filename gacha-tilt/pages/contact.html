<header class="hero">
  <div class="hero-inner">
    <div class="logo-area">
      <div class="logo-mark">GT</div>
      <div class="logo-text">
        <h1>お問い合わせ</h1>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <section class="panel">
    <h2>お問い合わせフォーム</h2>

    <form action="https://formspree.io/f/xeerzrzr" method="POST" class="contact-form">

      <input type="hidden" name="_redirect" value="https://あなたのサイトURL/pages/thanks.html">

      <label>お名前</label>
      <input type="text" name="name" required>

      <label>メールアドレス</label>
      <input type="email" name="email" required>

      <label>お問い合わせ内容</label>
      <textarea name="message" rows="5" required></textarea>

      <button type="submit" class="btn-primary">送信</button>
    </form>
  </section>
</main>
